<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AttendSense - QR Presence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
      :root {
        --primary: #059669;
        --primary-dark: #047857;
        --secondary: #0f766e;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text: #1e293b;
        --text-light: #64748b;
        --border: #e2e8f0;
        --success: #10b981;
        --error: #ef4444;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, var(--bg) 0%, #f0f4f8 100%);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.5;
      }

      header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        color: white;
        padding: 32px 24px;
        text-align: center;
        box-shadow: var(--shadow-lg), 0 20px 40px rgba(5, 150, 105, 0.15);
        position: relative;
        overflow: hidden;
        border-bottom-left-radius: 24px;
        border-bottom-right-radius: 24px;
      }

      header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        animation: pulse 8s infinite;
      }

      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
      }

      header h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      header h1::before {
        content: '\f274';
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        font-size: 1.5rem;
        opacity: 0.8;
      }

      .container {
        max-width: 1440px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      @media (max-width: 768px) {
        .container {
          padding: 32px 16px;
        }
        
        header h1 {
          font-size: 1.75rem;
        }
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 32px;
      }

      @media (max-width: 1280px) {
        .dashboard-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 768px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: var(--card-bg);
        padding: 32px;
        border-radius: 24px;
        box-shadow: var(--shadow-md);
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border);
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
        transform: scaleX(0);
        transition: transform 0.3s ease;
      }

      .card:hover {
        box-shadow: var(--shadow-lg);
        transform: translateY(-4px);
      }

      .card:hover::before {
        transform: scaleX(1);
      }

      .card h2 {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .card h2 i {
        color: var(--primary);
        font-size: 1.25rem;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 1rem;
        color: var(--text);
        transition: all 0.3s ease;
        background: #ffffff;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
      }

      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
      }

      input::placeholder {
        color: var(--text-light);
      }

      button {
        width: 100%;
        padding: 14px 16px;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-shadow: var(--shadow-sm), 0 4px 12px rgba(5, 150, 105, 0.2);
      }

      button:hover:not(:disabled) { 
        transform: translateY(-2px);
        box-shadow: var(--shadow-md), 0 6px 16px rgba(5, 150, 105, 0.3);
      }

      button:active:not(:disabled) {
        transform: translateY(0);
      }

      button:disabled { 
        background: var(--border);
        color: var(--text-light);
        cursor: not-allowed;
        box-shadow: none;
      }

      .status-text { 
        font-size: 0.875rem; 
        margin-top: 12px; 
        text-align: center; 
        min-height: 24px;
        font-weight: 500;
        padding: 8px 12px;
        border-radius: 8px;
      }

      .success { 
        color: var(--success);
        background: rgba(16, 185, 129, 0.1);
      }

      .error { 
        color: var(--error);
        background: rgba(239, 68, 68, 0.1);
      }

      #qr-container { 
        display: flex; 
        justify-content: center; 
        margin-top: 24px;
        padding: 16px;
        background: #f8fafc;
        border-radius: 16px;
        box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
      }

      #reader { 
        width: 100%; 
        border-radius: 16px; 
        overflow: hidden; 
        margin-bottom: 16px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
      }
      
      .attendee-list {
        list-style: none;
        padding: 0;
        margin: 24px 0 0 0;
        max-height: 400px;
        overflow-y: auto;
        border-top: 1px solid var(--border);
      }

      .attendee-list::-webkit-scrollbar {
        width: 6px;
      }

      .attendee-list::-webkit-scrollbar-track {
        background: transparent;
        border-radius: 10px;
      }

      .attendee-list::-webkit-scrollbar-thumb {
        background: var(--text-light);
        border-radius: 10px;
      }

      .attendee-list::-webkit-scrollbar-thumb:hover {
        background: var(--primary);
      }

      .attendee-item {
        padding: 16px 0;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.95rem;
        transition: all 0.2s ease;
      }

      .attendee-item:hover {
        background: rgba(5, 150, 105, 0.05);
      }

      .attendee-item:last-child { 
        border-bottom: none; 
      }

      .attendee-item strong {
        color: var(--text);
        font-weight: 600;
        flex: 1;
      }

      .attendee-item span {
        color: var(--text-light);
        font-size: 0.875rem;
        background: rgba(255, 255, 255, 0.5);
        padding: 4px 8px;
        border-radius: 6px;
      }

      .back-button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 32px;
        padding: 12px 24px;
        background: linear-gradient(135deg, var(--secondary) 0%, var(--primary-dark) 100%);
        color: white;
        border: none;
        border-radius: 16px;
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.4s ease;
        box-shadow: var(--shadow-md), 0 4px 12px rgba(5, 150, 105, 0.2);
        position: relative;
        overflow: hidden;
      }

      .back-button::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
        transform: scale(0);
        transition: transform 0.4s ease;
      }

      .back-button:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg), 0 6px 16px rgba(5, 150, 105, 0.3);
      }

      .back-button:hover::before {
        transform: scale(1);
      }

      .back-button i {
        font-size: 1.25rem;
      }
    </style>
  </head>
  <body>

    <header>
      <h1>QR Presence Dashboard</h1>
    </header>

    <div class="container">
      <a href="homepage.html" class="back-button"><i class="fas fa-arrow-left"></i> Kembali ke Homepage</a>
      <div class="dashboard-grid">
        <div class="card">
          <h2><i class="fas fa-qrcode"></i>1. Portal Dosen (Generate QR)</h2>
          <input type="text" id="genCourseId" placeholder="Course ID (Contoh: cloud-101)" value="cloud-101" />
          <input type="text" id="genSessionId" placeholder="Session ID (Contoh: sesi-02)" value="sesi-02" />
          <button id="btnGenerate" onclick="generateQR()">Buat QR Code</button>
          <div id="qr-container"></div>
          <p id="genStatus" class="status-text"></p>
        </div>

        <div class="card">
          <h2><i class="fas fa-camera"></i>2. Portal Mahasiswa (Scan)</h2>
          <input type="text" id="scanUserId" placeholder="Masukkan NIM" required />
          <div id="reader"></div>
          <p id="scanStatus" class="status-text"></p>
          <button id="btnRestartScan" onclick="restartScanner()" style="display:none; background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);">Scan Ulang</button>
        </div>

        <div class="card">
          <h2><i class="fas fa-list-ul"></i>3. Data Kehadiran</h2>
          <input type="text" id="listCourseId" placeholder="Course ID" value="cloud-101" />
          <input type="text" id="listSessionId" placeholder="Session ID" value="sesi-02" />
          <button onclick="fetchAttendanceList()">Refresh Data</button>
          <ul id="attendeeList" class="attendee-list">
            <li class="status-text">Klik Refresh untuk melihat data.</li>
          </ul>
        </div>
      </div>
    </div>

    <script>
      const BASE_URL = "https://script.google.com/macros/s/AKfycbwRq4wPHPd2L5aBObz7l6VattTpgtUp82Z8_7Sy8HCWZ003xpvjKcO0fVPnXsAKbZkj/exec";
      let html5QrcodeScanner = null;

      // ==========================================
      // LOGIKA KOLOM 1: GENERATE QR
      // ==========================================
      async function generateQR() {
        const courseId = document.getElementById("genCourseId").value.trim();
        const sessionId = document.getElementById("genSessionId").value.trim();
        const statusEl = document.getElementById("genStatus");
        const qrContainer = document.getElementById("qr-container");

        if(!courseId || !sessionId) return alert("Course ID dan Session ID wajib diisi.");

        qrContainer.innerHTML = "";
        statusEl.innerText = "Meminta token...";
        statusEl.className = "status-text";
        document.getElementById("btnGenerate").disabled = true;

        const payload = { course_id: courseId, session_id: sessionId, ts: new Date().toISOString() };

        try {
          const response = await fetch(`${BASE_URL}?path=presence/qr/generate`, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload),
          });

          const result = await response.json();
          if (result.ok) {
            statusEl.innerText = `Token: ${result.data.qr_token}`;
            statusEl.className = "status-text success";
            new QRCode(qrContainer, { text: result.data.qr_token, width: 200, height: 200 });
            
            // Sinkronisasi input kolom 3 agar selaras
            document.getElementById("listCourseId").value = courseId;
            document.getElementById("listSessionId").value = sessionId;
          } else {
            statusEl.innerText = `Gagal: ${result.error}`;
            statusEl.className = "status-text error";
          }
        } catch (error) {
          statusEl.innerText = "Error Jaringan.";
          statusEl.className = "status-text error";
        } finally {
          document.getElementById("btnGenerate").disabled = false;
        }
      }

      // ==========================================
      // LOGIKA KOLOM 2: SCANNER MAHASISWA
      // ==========================================
      function getDeviceId() {
        let devId = localStorage.getItem("attendsense_device_id");
        if (!devId) {
          devId = "DEV-" + Math.random().toString(36).substring(2, 10).toUpperCase();
          localStorage.setItem("attendsense_device_id", devId);
        }
        return devId;
      }

      async function onScanSuccess(decodedText) {
        const userId = document.getElementById("scanUserId").value.trim();
        // Mengambil Course & Session dari input Generate agar terpusat
        const courseId = document.getElementById("genCourseId").value.trim();
        const sessionId = document.getElementById("genSessionId").value.trim();
        const statusEl = document.getElementById("scanStatus");

        if (!userId) {
          statusEl.innerText = "Isi NIM terlebih dahulu!";
          statusEl.className = "status-text error";
          return;
        }

        html5QrcodeScanner.clear(); // Hentikan kamera agar tidak dobel scan
        statusEl.innerText = "Memproses...";
        statusEl.className = "status-text";

        const payload = {
          user_id: userId, device_id: getDeviceId(),
          course_id: courseId, session_id: sessionId,
          qr_token: decodedText, ts: new Date().toISOString()
        };

        try {
          const response = await fetch(`${BASE_URL}?path=presence/checkin`, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload),
          });

          const result = await response.json();
          if (result.ok) {
            statusEl.innerText = `Berhasil Check-in!`;
            statusEl.className = "status-text success";
            document.getElementById("scanUserId").value = ""; // Reset form NIM
            fetchAttendanceList(); // Auto update list kehadiran
          } else {
            statusEl.innerText = `Gagal: ${result.error}`;
            statusEl.className = "status-text error";
          }
        } catch (error) {
          statusEl.innerText = "Error server.";
          statusEl.className = "status-text error";
        } finally {
          document.getElementById("btnRestartScan").style.display = "block";
        }
      }

      function initScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 200, height: 200 } }, false);
        html5QrcodeScanner.render(onScanSuccess, () => {});
      }

      function restartScanner() {
        document.getElementById("btnRestartScan").style.display = "none";
        document.getElementById("scanStatus").innerText = "";
        initScanner();
      }

      // ==========================================
      // LOGIKA KOLOM 3: LIST KEHADIRAN
      // ==========================================
      async function fetchAttendanceList() {
        const courseId = document.getElementById("listCourseId").value.trim();
        const sessionId = document.getElementById("listSessionId").value.trim();
        const listEl = document.getElementById("attendeeList");

        listEl.innerHTML = `<li class="status-text">Mengambil data...</li>`;

        try {
          const response = await fetch(`${BASE_URL}?path=presence/list&course_id=${courseId}&session_id=${sessionId}`);
          const result = await response.json();

          if (result.ok) {
            if (result.data.length === 0) {
              listEl.innerHTML = `<li class="status-text">Belum ada yang hadir.</li>`;
              return;
            }
            
            listEl.innerHTML = "";
            result.data.forEach(item => {
              const dateObj = new Date(item.time);
              const timeStr = dateObj.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
              
              listEl.innerHTML += `
                <li class="attendee-item">
                  <strong>${item.user_id}</strong>
                  <span>${timeStr}</span>
                </li>`;
            });
          } else {
            listEl.innerHTML = `<li class="status-text error">Error: ${result.error}</li>`;
          }
        } catch (error) {
          listEl.innerHTML = `<li class="status-text error">Gagal memuat data.</li>`;
        }
      }

      // Inisialisasi saat web pertama kali dimuat
      window.onload = () => {
        initScanner();
        fetchAttendanceList();
      };
    </script>
  </body>
</html>

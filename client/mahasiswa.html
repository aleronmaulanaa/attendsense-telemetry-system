<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Mahasiswa - AttendSense</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <style>
      :root {
        --primary: #059669; --primary-dark: #047857; --secondary: #0f766e;
        --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --text-light: #64748b;
        --border: #e2e8f0; --success: #10b981; --error: #ef4444; --info: #0284c7;
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: "Inter", sans-serif; background: linear-gradient(135deg, var(--bg) 0%, #f0f4f8 100%); color: var(--text); min-height: 100vh; line-height: 1.5; }
      header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 32px 24px; text-align: center; box-shadow: var(--shadow-lg); border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; }
      header h1 { font-size: 2rem; font-weight: 700; }
      .container { max-width: 600px; margin: 0 auto; padding: 48px 24px; }
      .card { background: var(--card-bg); padding: 32px; border-radius: 24px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; border: 1px solid var(--border); }
      .card h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
      .card h2 i { color: var(--primary); font-size: 1.25rem; }
      input { width: 100%; padding: 12px 16px; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 1rem; }
      input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1); }
      button { width: 100%; padding: 14px 16px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: all 0.3s ease; }
      button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: var(--shadow-md); }
      .status-text { font-size: 0.875rem; margin-top: 12px; text-align: center; min-height: 24px; font-weight: 500; padding: 8px 12px; border-radius: 8px; }
      .success { color: var(--success); background: rgba(16, 185, 129, 0.1); }
      .info { color: var(--info); background: rgba(2, 132, 199, 0.1); }
      .error { color: var(--error); background: rgba(239, 68, 68, 0.1); }
      #reader { width: 100%; border-radius: 16px; overflow: hidden; margin-bottom: 16px; border: 1px solid var(--border); }
    </style>
  </head>
  <body>
    <header>
      <h1>Portal Mahasiswa - Scan QR</h1>
    </header>

    <div class="container">
      <div class="card">
        <h2><i class="fas fa-camera"></i>Scan Kehadiran</h2>
        <input type="text" id="scanUserId" placeholder="Masukkan NIM (Hanya Angka)" inputmode="numeric" pattern="[0-9]*" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required />
        
        <input type="text" id="genCourseId" placeholder="Course ID (Diberikan Dosen)" value="cloud-101" />
        <input type="text" id="genSessionId" placeholder="Session ID (Diberikan Dosen)" value="sesi-02" />

        <div id="reader"></div>
        <p id="scanStatus" class="status-text"></p>
        <button id="btnRestartScan" onclick="restartScanner()" style="display: none; background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);">Scan Ulang</button>
      </div>
    </div>

    <script>
      const BASE_URL = "https://script.google.com/macros/s/AKfycbwpXGxBBT8gE11OSskATkK2INTdk06XSULJ5g4LwV_UOfTPI88q5WKXyji3dbMbDM-0/exec";
      let html5QrcodeScanner = null;

      function getDeviceId() {
        let devId = localStorage.getItem("attendsense_device_id");
        if (!devId) {
          devId = "DEV-" + Math.random().toString(36).substring(2, 10).toUpperCase();
          localStorage.setItem("attendsense_device_id", devId);
        }
        return devId;
      }

      async function onScanSuccess(decodedText) {
        const userId = document.getElementById("scanUserId").value.trim();
        const courseId = document.getElementById("genCourseId").value.trim();
        const sessionId = document.getElementById("genSessionId").value.trim();
        const statusEl = document.getElementById("scanStatus");

        if (!userId) {
          statusEl.innerText = "Isi NIM terlebih dahulu!";
          statusEl.className = "status-text error";
          return;
        }

        html5QrcodeScanner.clear();
        statusEl.innerText = "Memproses...";
        statusEl.className = "status-text";

        const payload = {
          user_id: userId, device_id: getDeviceId(), course_id: courseId, session_id: sessionId,
          qr_token: decodedText, ts: new Date().toISOString(),
        };

        try {
          const response = await fetch(`${BASE_URL}?path=presence/checkin`, {
            method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload),
          });

          const result = await response.json();
          if (result.ok) {
            statusEl.innerText = `Berhasil Check-in!`;
            statusEl.className = "status-text success";
            document.getElementById("scanUserId").value = "";
          } else {
            if (result.error === "session_limit_reached") {
              statusEl.innerText = "Gagal: Kuota kelas sesi ini sudah penuh!";
              statusEl.className = "status-text error";
            } else if (result.error === "already_checked_in") {
              statusEl.innerText = "Info: Anda sudah berhasil absen di sesi ini sebelumnya.";
              statusEl.className = "status-text info";
            } else if (result.error === "token_expired") {
              statusEl.innerText = "Gagal: QR Code sudah kedaluwarsa. Tunggu QR berikutnya!";
              statusEl.className = "status-text error";
            } else {
              statusEl.innerText = `Gagal: ${result.error}`;
              statusEl.className = "status-text error";
            }
          }
        } catch (error) {
          statusEl.innerText = "Error server.";
          statusEl.className = "status-text error";
        } finally {
          document.getElementById("btnRestartScan").style.display = "block";
        }
      }

      function initScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 200, height: 200 } }, false);
        html5QrcodeScanner.render(onScanSuccess, () => {});
      }

      function restartScanner() {
        document.getElementById("btnRestartScan").style.display = "none";
        document.getElementById("scanStatus").innerText = "";
        initScanner();
      }

      window.onload = initScanner;
    </script>
  </body>
</html>

    <div class="card">
      <h2>Generate QR Presensi</h2>

      <input

      />

        placeholder="Contoh: sesi-02"
        value="sesi-02"
      />

      <button onclick="generateQR()">Buat QR Code</button>

      <div id="qr-container"></div>
      <p id="status-message" class="info-text"></p>
    </div>

    <script>
      // 1. Masukkan URL Web App GAS-mu yang baru (yang berakhiran /exec)
      const BASE_URL = "https://script.google.com/macros/s/AKfycbwRq4wPHPd2L5aBObz7l6VattTpgtUp82Z8_7Sy8HCWZ003xpvjKcO0fVPnXsAKbZkj/exec?path=ui";

      async function generateQR() {
        const courseId = document.getElementById("courseId").value;
        const sessionId = document.getElementById("sessionId").value;
        const statusMessage = document.getElementById("status-message");
        const qrContainer = document.getElementById("qr-container");

        qrContainer.innerHTML = "";
        statusMessage.innerText = "Meminta token dari server...";

        const payload = {
          course_id: courseId,
          session_id: sessionId,
          ts: new Date().toISOString(),
        };

        try {
          // 2. PERHATIKAN PERUBAHAN DI SINI: Kita menggunakan "?path="
          const targetUrl = BASE_URL + "?path=presence/qr/generate";

          const response = await fetch(targetUrl, {
            method: "POST",
            // Memaksa Simple Request agar terhindar dari Preflight CORS
            headers: {
              "Content-Type": "text/plain;charset=utf-8",
            },
            body: JSON.stringify(payload),
          });

          const result = await response.json();

          if (result.ok) {
            const qrToken = result.data.qr_token;
            statusMessage.innerText = `Berhasil! Token: ${qrToken}`;

            new QRCode(qrContainer, {
              text: qrToken,
              width: 200,
              height: 200,
              colorDark: "#000000",
              colorLight: "#ffffff",
              correctLevel: QRCode.CorrectLevel.H,
            });
          } else {
            statusMessage.innerText = `Gagal dari Backend: ${result.error}`;
          }
        } catch (error) {
          console.error("Error Jaringan/CORS:", error);
          statusMessage.innerText = "Gagal terhubung ke server. Cek console.";
        }
      }
    </script>
  </body>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AttendSense - Presentasi Terpadu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #f8fafc;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden; /* Mencegah scroll ganda di halaman utama */
      }
      header {
        background: linear-gradient(135deg, #059669 0%, #047857 100%);
        color: white;
        padding: 20px 24px;
        text-align: center;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        z-index: 10;
      }
      .iframe-wrapper {
        display: flex;
        flex: 1;
        width: 100%;
        height: 100%;
      }
      iframe {
        border: none;
        height: 100%;
      }
      /* Mengatur proporsi lebar iframe */
      #frame-dosen {
        flex: 2; /* Mengambil 2/3 ruang karena ada 2 card (Generate & List) */
        border-right: 2px solid #e2e8f0;
      }
      #frame-mahasiswa {
        flex: 1; /* Mengambil 1/3 ruang untuk 1 card (Scan) */
        background: #f0f4f8; /* Sedikit beda warna agar terlihat batasnya */
      }

      /* Responsif untuk layar kecil */
      @media (max-width: 1024px) {
        .iframe-wrapper {
          flex-direction: column;
        }
        #frame-dosen {
          border-right: none;
          border-bottom: 2px solid #e2e8f0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>AttendSense - Dashboard Presentasi</h1>
    </header>

    <div class="iframe-wrapper">
      <iframe id="frame-dosen" src="dosen.html" title="Portal Dosen"></iframe>
      
      <iframe id="frame-mahasiswa" src="mahasiswa.html" title="Portal Mahasiswa"></iframe>
    </div>
  </body>
</html>
